<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Semwal Bespoke Fabrics Catalog</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #181716;
        --muted: #69635d;
        --line: #ded8d0;
        --paper: #fbfaf7;
        --panel: #ffffff;
        --accent: #166f67;
        --accent-2: #8c3f2f;
        --shadow: 0 10px 28px rgba(26, 22, 18, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .wrap {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      .mast {
        display: grid;
        gap: 18px;
        padding: 28px 0 22px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 48px);
        line-height: 1.04;
        letter-spacing: 0;
      }

      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
      }

      .tools {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
      }

      input {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 14px;
        background: #fff;
        color: var(--ink);
        font-size: 16px;
        outline: none;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(22, 111, 103, 0.16);
      }

      .filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        font: inherit;
      }

      button.active {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      main {
        padding: 22px 0 40px;
      }

      .stats {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 16px;
        color: var(--muted);
        font-size: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        gap: 14px;
      }

      .card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .thumb {
        display: grid;
        place-items: center;
        aspect-ratio: 1;
        background: #eee9e2;
      }

      .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 11px 11px;
      }

      .code {
        font-weight: 750;
        font-size: 16px;
      }

      .type {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .empty {
        display: none;
        padding: 34px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        text-align: center;
        color: var(--muted);
        background: #fff;
      }

      @media (max-width: 680px) {
        .tools {
          grid-template-columns: 1fr;
        }

        .grid {
          grid-template-columns: repeat(auto-fill, minmax(136px, 1fr));
          gap: 10px;
        }

        .stats {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap mast">
        <div>
          <h1>Semwal Bespoke Fabrics</h1>
          <p class="sub">Search by fabric code, series, or filename.</p>
        </div>
        <div class="tools">
          <input id="search" type="search" placeholder="Search fabric code, e.g. I-440 or PI-531" autocomplete="off" />
          <div class="filters" aria-label="Catalog filters">
            <button class="active" type="button" data-filter="all">All</button>
            <button type="button" data-filter="I">I</button>
            <button type="button" data-filter="PI">PI</button>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap">
      <div class="stats">
        <span id="resultCount">Loading fabrics...</span>
        <span>Tip: use browser find on GitHub, or this search on GitHub Pages.</span>
      </div>
      <section id="grid" class="grid" aria-live="polite"></section>
      <div id="empty" class="empty">No fabric matched that search.</div>
    </main>

    <script>
      const grid = document.querySelector("#grid");
      const empty = document.querySelector("#empty");
      const search = document.querySelector("#search");
      const resultCount = document.querySelector("#resultCount");
      const filterButtons = Array.from(document.querySelectorAll("[data-filter]"));
      let fabrics = [];
      let activeFilter = "all";

      function matchesFilter(item) {
        if (activeFilter === "all") return true;
        return item.code.startsWith(`${activeFilter}-`);
      }

      function matchesQuery(item, query) {
        if (!query) return true;
        const haystack = `${item.code} ${item.type} ${item.filename}`.toLowerCase();
        return haystack.includes(query.toLowerCase());
      }

      function render() {
        const query = search.value.trim();
        const visible = fabrics.filter((item) => matchesFilter(item) && matchesQuery(item, query));
        grid.innerHTML = visible
          .map(
            (item) => `
              <article class="card">
                <a class="thumb" href="${item.image}" aria-label="Open ${item.code}">
                  <img src="${item.thumb || item.image}" alt="${item.code}" loading="lazy" decoding="async" />
                </a>
                <div class="meta">
                  <span class="code">${item.code}</span>
                  <span class="type">${item.type}</span>
                </div>
              </article>
            `
          )
          .join("");
        resultCount.textContent = `${visible.length} of ${fabrics.length} fabrics`;
        empty.style.display = visible.length ? "none" : "block";
      }

      filterButtons.forEach((button) => {
        button.addEventListener("click", () => {
          activeFilter = button.dataset.filter;
          filterButtons.forEach((item) => item.classList.toggle("active", item === button));
          render();
        });
      });

      search.addEventListener("input", render);

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      }

      fetch("catalog-data.json", { cache: "force-cache" })
        .then((response) => response.json())
        .then((data) => {
          fabrics = data;
          render();
        })
        .catch(() => {
          resultCount.textContent = "Catalog data could not be loaded.";
        });
    </script>
  </body>
</html>
