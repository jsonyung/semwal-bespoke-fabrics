<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Semwal Bespoke Fabrics Catalog</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #181716;
        --muted: #69635d;
        --line: #ded8d0;
        --paper: #fbfaf7;
        --panel: #ffffff;
        --accent: #166f67;
        --accent-2: #8c3f2f;
        --shadow: 0 10px 28px rgba(26, 22, 18, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body.viewer-open {
        overflow: hidden;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .wrap {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      .mast {
        display: grid;
        gap: 18px;
        padding: 28px 0 22px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 48px);
        line-height: 1.04;
        letter-spacing: 0;
      }

      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
      }

      .tools {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 12px;
        align-items: center;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      input {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 14px;
        background: #fff;
        color: var(--ink);
        font-size: 16px;
        outline: none;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(22, 111, 103, 0.16);
      }

      .filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        font: inherit;
      }

      .action-link,
      .action-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        background: #fff;
        color: var(--ink);
        text-decoration: none;
        font: inherit;
        white-space: nowrap;
      }

      .action-link.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      button.active {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .icon-btn {
        display: grid;
        place-items: center;
        width: 40px;
        min-width: 40px;
        height: 40px;
        min-height: 40px;
        border-radius: 999px;
        border-color: var(--line);
        background: #fff;
        color: var(--ink);
        font-size: 24px;
        line-height: 1;
      }

      .icon-btn:hover {
        background: #f2eee8;
      }

      main {
        padding: 22px 0 40px;
      }

      .stats {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 16px;
        color: var(--muted);
        font-size: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        gap: 14px;
      }

      .card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .thumb {
        display: grid;
        place-items: center;
        aspect-ratio: 1;
        background: #eee9e2;
      }

      .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 11px 11px;
      }

      .code {
        font-weight: 750;
        font-size: 16px;
      }

      .type {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .empty {
        display: none;
        padding: 34px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        text-align: center;
        color: var(--muted);
        background: #fff;
      }

      .viewer {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        grid-template-rows: auto minmax(0, 1fr) auto;
        background: var(--paper);
        color: var(--ink);
      }

      .viewer.open {
        display: grid;
      }

      .viewer-top {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .viewer-title {
        min-width: 0;
      }

      .viewer-code {
        display: block;
        font-size: 24px;
        font-weight: 800;
      }

      .viewer-detail {
        color: var(--muted);
        font-size: 13px;
      }

      .viewer-stage {
        position: relative;
        display: grid;
        grid-template-columns: 68px minmax(0, 1fr) 68px;
        gap: 8px;
        align-items: center;
        min-height: 0;
        padding: 18px;
      }

      .viewer-image-wrap {
        display: grid;
        place-items: center;
        min-width: 0;
        min-height: 0;
        height: 100%;
      }

      .viewer-image {
        max-width: 100%;
        max-height: calc(100vh - 184px);
        border-radius: 6px;
        object-fit: contain;
        background: #fff;
        box-shadow: var(--shadow);
      }

      .viewer-arrow {
        justify-self: center;
        width: 46px;
        min-width: 46px;
        height: 46px;
        min-height: 46px;
        font-size: 32px;
      }

      .viewer-bottom {
        display: grid;
        gap: 8px;
        padding: 10px 16px 14px;
        background: var(--panel);
        border-top: 1px solid var(--line);
      }

      .viewer-count {
        color: var(--muted);
        font-size: 12px;
        text-align: center;
      }

      .filmstrip {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 2px 4px 6px;
        scrollbar-color: #b9b0a8 transparent;
      }

      .filmstrip button {
        flex: 0 0 auto;
        width: 58px;
        height: 58px;
        min-height: 58px;
        padding: 0;
        overflow: hidden;
        border-radius: 6px;
        border: 2px solid transparent;
        background: #eee9e2;
      }

      .filmstrip button.active {
        border-color: var(--accent);
        background: #eee9e2;
      }

      .filmstrip img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      @media (max-width: 680px) {
        .tools {
          grid-template-columns: 1fr;
        }

        .actions {
          width: 100%;
        }

        .action-link,
        .action-button {
          flex: 1 1 140px;
        }

        .grid {
          grid-template-columns: repeat(auto-fill, minmax(136px, 1fr));
          gap: 10px;
        }

        .stats {
          align-items: flex-start;
          flex-direction: column;
        }

        .viewer-stage {
          grid-template-columns: 1fr;
          padding: 10px;
        }

        .viewer-arrow {
          position: absolute;
          top: 50%;
          transform: translateY(-50%);
        }

        #prevButton {
          left: 10px;
        }

        #nextButton {
          right: 10px;
        }

        .viewer-image {
          max-height: calc(100vh - 196px);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap mast">
        <div>
          <h1>Semwal Bespoke Fabrics</h1>
          <p class="sub">Search by fabric code, series, or filename.</p>
        </div>
        <div class="tools">
          <input id="search" type="search" placeholder="Search fabric code, e.g. I-440 or PI-531" autocomplete="off" />
          <div class="filters" aria-label="Catalog filters">
            <button class="active" type="button" data-filter="all">All</button>
            <button type="button" data-filter="I">I</button>
            <button type="button" data-filter="PI">PI</button>
          </div>
          <div class="actions">
            <button id="openGallery" class="action-button" type="button">Gallery View</button>
            <a class="action-link primary" href="semwal-bespoke-fabrics-catalog.pdf" download>Download PDF</a>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap">
      <div class="stats">
        <span id="resultCount">Loading fabrics...</span>
        <span>Tip: use browser find on GitHub, or this search on GitHub Pages.</span>
      </div>
      <section id="grid" class="grid" aria-live="polite"></section>
      <div id="empty" class="empty">No fabric matched that search.</div>
    </main>

    <section id="viewer" class="viewer" aria-modal="true" role="dialog" aria-label="Fabric viewer">
      <div class="viewer-top">
        <button id="closeViewer" class="icon-btn" type="button" aria-label="Close viewer">&times;</button>
        <div class="viewer-title">
          <span id="viewerCode" class="viewer-code"></span>
          <span id="viewerDetail" class="viewer-detail"></span>
        </div>
        <a id="openOriginal" class="icon-btn" href="#" target="_blank" rel="noreferrer" aria-label="Open original image">&#8599;</a>
      </div>
      <div class="viewer-stage">
        <button id="prevButton" class="icon-btn viewer-arrow" type="button" aria-label="Previous fabric">&#8249;</button>
        <div class="viewer-image-wrap">
          <img id="viewerImage" class="viewer-image" alt="" />
        </div>
        <button id="nextButton" class="icon-btn viewer-arrow" type="button" aria-label="Next fabric">&#8250;</button>
      </div>
      <div class="viewer-bottom">
        <div id="viewerCount" class="viewer-count"></div>
        <div id="filmstrip" class="filmstrip" aria-label="Fabric thumbnails"></div>
      </div>
    </section>

    <script>
      const grid = document.querySelector("#grid");
      const empty = document.querySelector("#empty");
      const search = document.querySelector("#search");
      const resultCount = document.querySelector("#resultCount");
      const filterButtons = Array.from(document.querySelectorAll("[data-filter]"));
      const viewer = document.querySelector("#viewer");
      const viewerCode = document.querySelector("#viewerCode");
      const viewerDetail = document.querySelector("#viewerDetail");
      const viewerImage = document.querySelector("#viewerImage");
      const viewerCount = document.querySelector("#viewerCount");
      const filmstrip = document.querySelector("#filmstrip");
      const openOriginal = document.querySelector("#openOriginal");
      const closeViewer = document.querySelector("#closeViewer");
      const prevButton = document.querySelector("#prevButton");
      const nextButton = document.querySelector("#nextButton");
      const openGallery = document.querySelector("#openGallery");
      let fabrics = [];
      let visibleFabrics = [];
      let activeFilter = "all";
      let activeIndex = 0;

      function matchesFilter(item) {
        if (activeFilter === "all") return true;
        return item.code.startsWith(`${activeFilter}-`);
      }

      function matchesQuery(item, query) {
        if (!query) return true;
        const haystack = `${item.code} ${item.type} ${item.filename}`.toLowerCase();
        return haystack.includes(query.toLowerCase());
      }

      function render() {
        const query = search.value.trim();
        visibleFabrics = fabrics.filter((item) => matchesFilter(item) && matchesQuery(item, query));
        grid.innerHTML = visibleFabrics
          .map(
            (item, index) => `
              <article class="card">
                <a class="thumb" href="${item.image}" data-index="${index}" aria-label="Open ${item.code}">
                  <img src="${item.thumb || item.image}" alt="${item.code}" loading="lazy" decoding="async" />
                </a>
                <div class="meta">
                  <span class="code">${item.code}</span>
                  <span class="type">${item.type}</span>
                </div>
              </article>
            `
          )
          .join("");
        resultCount.textContent = `${visibleFabrics.length} of ${fabrics.length} fabrics`;
        empty.style.display = visibleFabrics.length ? "none" : "block";
      }

      function renderFilmstrip() {
        const start = Math.max(0, activeIndex - 18);
        const end = Math.min(visibleFabrics.length, activeIndex + 19);
        filmstrip.innerHTML = visibleFabrics
          .slice(start, end)
          .map((item, offset) => {
            const index = start + offset;
            return `
              <button type="button" class="${index === activeIndex ? "active" : ""}" data-index="${index}" aria-label="Open ${item.code}">
                <img src="${item.thumb || item.image}" alt="${item.code}" loading="lazy" decoding="async" />
              </button>
            `;
          })
          .join("");
        const activeThumb = filmstrip.querySelector("button.active");
        activeThumb?.scrollIntoView({ inline: "center", block: "nearest" });
      }

      function showFabric(index) {
        if (!visibleFabrics.length) return;
        activeIndex = (index + visibleFabrics.length) % visibleFabrics.length;
        const item = visibleFabrics[activeIndex];
        viewerCode.textContent = item.code;
        viewerDetail.textContent = `${item.filename} · ${item.type}`;
        viewerImage.src = item.image;
        viewerImage.alt = item.code;
        openOriginal.href = item.image;
        viewerCount.textContent = `${activeIndex + 1} of ${visibleFabrics.length}`;
        renderFilmstrip();
      }

      function openViewer(index) {
        showFabric(index);
        viewer.classList.add("open");
        document.body.classList.add("viewer-open");
        closeViewer.focus();
      }

      function closeViewerPanel() {
        viewer.classList.remove("open");
        document.body.classList.remove("viewer-open");
        viewerImage.removeAttribute("src");
      }

      function moveViewer(direction) {
        showFabric(activeIndex + direction);
      }

      grid.addEventListener("click", (event) => {
        const link = event.target.closest("[data-index]");
        if (!link) return;
        event.preventDefault();
        openViewer(Number(link.dataset.index));
      });

      filmstrip.addEventListener("click", (event) => {
        const button = event.target.closest("[data-index]");
        if (!button) return;
        showFabric(Number(button.dataset.index));
      });

      closeViewer.addEventListener("click", closeViewerPanel);
      prevButton.addEventListener("click", () => moveViewer(-1));
      nextButton.addEventListener("click", () => moveViewer(1));
      openGallery.addEventListener("click", () => {
        if (visibleFabrics.length) openViewer(0);
      });
      viewer.addEventListener("click", (event) => {
        if (event.target === viewer) closeViewerPanel();
      });

      document.addEventListener("keydown", (event) => {
        if (!viewer.classList.contains("open")) return;
        if (event.key === "Escape") closeViewerPanel();
        if (event.key === "ArrowLeft") moveViewer(-1);
        if (event.key === "ArrowRight") moveViewer(1);
      });

      filterButtons.forEach((button) => {
        button.addEventListener("click", () => {
          activeFilter = button.dataset.filter;
          filterButtons.forEach((item) => item.classList.toggle("active", item === button));
          render();
        });
      });

      search.addEventListener("input", render);

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      }

      fetch("catalog-data.json", { cache: "force-cache" })
        .then((response) => response.json())
        .then((data) => {
          fabrics = data;
          render();
        })
        .catch(() => {
          resultCount.textContent = "Catalog data could not be loaded.";
        });
    </script>
  </body>
</html>
