<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Semwal Bespoke Fabrics Catalog</title>
    <link rel="icon" href="assets/semwal-logo.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: light;
        --ink: #1b1e28;
        --muted: #5a6072;
        --soft: #8a8fa3;
        --line: #d8dce8;
        --paper: #f6f7fb;
        --panel: #ffffff;
        --panel-2: #edeff6;
        --accent: #3f51b5;
        --accent-2: #1e88e5;
        --shadow: 0 14px 34px rgba(27, 30, 40, 0.08);
        --strong-shadow: 0 20px 54px rgba(27, 30, 40, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body.viewer-open {
        overflow: hidden;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .wrap {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      .mast {
        display: grid;
        gap: 22px;
        padding: 28px 0 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
      }

      .brand-main {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }

      .brand-logo {
        width: 58px;
        height: 58px;
        border-radius: 14px;
        box-shadow: var(--shadow);
      }

      .brand-stat {
        display: grid;
        min-width: 116px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        background: var(--paper);
        text-align: right;
      }

      .brand-stat strong {
        font-size: 20px;
        line-height: 1;
      }

      .brand-stat span {
        color: var(--muted);
        font-size: 12px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 48px);
        line-height: 1.04;
        letter-spacing: 0;
      }

      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
      }

      .tools {
        display: grid;
        grid-template-columns: minmax(280px, 1fr) auto;
        gap: 12px;
        align-items: center;
      }

      .filter-panel {
        display: grid;
        grid-column: 1 / -1;
        gap: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: var(--paper);
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      input {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: 7px;
        padding: 0 14px;
        background: #fff;
        color: var(--ink);
        font-size: 16px;
        outline: none;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(63, 81, 181, 0.16);
      }

      .filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      .filter-label {
        width: 68px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
        text-transform: uppercase;
      }

      button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        font: inherit;
      }

      button:hover,
      .action-link:hover,
      .action-button:hover {
        border-color: var(--accent);
      }

      .action-link,
      .action-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        background: #fff;
        color: var(--ink);
        text-decoration: none;
        font: inherit;
        white-space: nowrap;
      }

      .action-link.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      button.active {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .filter-clear {
        justify-self: start;
        min-height: 34px;
        color: var(--muted);
      }

      .icon-btn {
        display: grid;
        place-items: center;
        width: 40px;
        min-width: 40px;
        height: 40px;
        min-height: 40px;
        border-radius: 999px;
        border-color: var(--line);
        background: #fff;
        color: var(--ink);
        font-size: 24px;
        line-height: 1;
      }

      .icon-btn:hover {
        background: #f2eee8;
      }

      main {
        padding: 24px 0 44px;
      }

      .stats {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 16px;
        color: var(--muted);
        font-size: 14px;
      }

      .stats strong {
        color: var(--ink);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(176px, 1fr));
        gap: 16px;
      }

      .card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
        transition: border-color 150ms ease, box-shadow 150ms ease, transform 150ms ease;
      }

      .card:hover {
        border-color: rgba(63, 81, 181, 0.42);
        box-shadow: var(--strong-shadow);
        transform: translateY(-2px);
      }

      .thumb {
        display: grid;
        place-items: center;
        aspect-ratio: 1;
        background: var(--panel-2);
      }

      .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .meta {
        display: grid;
        gap: 8px;
        padding: 11px 12px 12px;
      }

      .meta-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .code {
        font-weight: 750;
        font-size: 16px;
      }

      .type {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .tag-row {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }

      .tag-chip {
        min-width: 0;
        border-radius: 999px;
        padding: 3px 7px;
        background: var(--panel-2);
        color: var(--muted);
        font-size: 11px;
        line-height: 1.2;
      }

      .empty {
        display: none;
        padding: 34px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        text-align: center;
        color: var(--muted);
        background: #fff;
      }

      .viewer {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        grid-template-rows: 74px minmax(0, 1fr) 104px;
        background: var(--paper);
        color: var(--ink);
      }

      .viewer.open {
        display: grid;
      }

      .viewer-top {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
        min-height: 74px;
        padding: 10px 18px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .viewer-title {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .viewer-mark {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #fff;
      }

      .viewer-copy {
        min-width: 0;
      }

      .viewer-code {
        display: block;
        font-size: 24px;
        font-weight: 800;
      }

      .viewer-detail {
        color: var(--muted);
        font-size: 13px;
      }

      .viewer-stage {
        position: relative;
        display: grid;
        grid-template-columns: 58px minmax(0, 1fr) 58px;
        gap: 12px;
        align-items: center;
        min-height: 0;
        padding: 18px 18px 14px;
      }

      .viewer-image-wrap {
        position: relative;
        display: grid;
        place-items: center;
        min-width: 0;
        min-height: 0;
        height: 100%;
      }

      .viewer-image {
        max-width: 100%;
        max-height: calc(100vh - 184px);
        border-radius: 6px;
        object-fit: contain;
        background: #fff;
        box-shadow: var(--strong-shadow);
        transition: opacity 160ms ease;
      }

      .viewer-image.loading {
        opacity: 0.72;
        filter: saturate(0.94);
      }

      .loading-badge {
        position: absolute;
        bottom: 16px;
        left: 50%;
        display: none;
        transform: translateX(-50%);
        border-radius: 999px;
        padding: 6px 10px;
        background: rgba(27, 30, 40, 0.78);
        color: #fff;
        font-size: 12px;
      }

      .viewer-image.loading + .loading-badge {
        display: block;
      }

      .viewer-arrow {
        justify-self: center;
        z-index: 3;
        width: 44px;
        min-width: 44px;
        height: 44px;
        min-height: 44px;
        font-size: 32px;
        box-shadow: var(--shadow);
      }

      .viewer-bottom {
        display: grid;
        gap: 8px;
        min-height: 104px;
        overflow: hidden;
        padding: 10px 16px 14px;
        background: var(--panel);
        border-top: 1px solid var(--line);
      }

      .viewer-count {
        color: var(--muted);
        font-size: 12px;
        text-align: center;
      }

      .filmstrip {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 2px 4px 6px;
        scrollbar-color: #b9b0a8 transparent;
      }

      .filmstrip button {
        flex: 0 0 auto;
        width: 58px;
        height: 58px;
        min-height: 58px;
        padding: 0;
        overflow: hidden;
        border-radius: 6px;
        border: 2px solid transparent;
        background: var(--panel-2);
      }

      .filmstrip button.active {
        border-color: var(--accent);
        background: var(--panel-2);
      }

      .filmstrip img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      @media (max-width: 680px) {
        .brand-logo {
          width: 48px;
          height: 48px;
          border-radius: 12px;
        }

        .brand {
          align-items: flex-start;
        }

        .brand-stat {
          display: none;
        }

        .tools {
          grid-template-columns: 1fr;
        }

        .filter-label {
          width: 100%;
        }

        .actions {
          width: 100%;
        }

        .action-link,
        .action-button {
          flex: 1 1 140px;
        }

        .grid {
          grid-template-columns: repeat(auto-fill, minmax(136px, 1fr));
          gap: 10px;
        }

        .stats {
          align-items: flex-start;
          flex-direction: column;
        }

        .viewer-stage {
          grid-template-columns: 1fr;
          padding: 10px;
        }

        .viewer-arrow {
          position: absolute;
          top: 50%;
          transform: translateY(-50%);
          z-index: 5;
          background: rgba(255, 255, 255, 0.94);
        }

        #prevButton {
          left: 12px;
        }

        #nextButton {
          right: 10px;
        }

        .viewer-image {
          max-height: calc(100vh - 196px);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap mast">
        <div class="brand">
          <div class="brand-main">
            <img class="brand-logo" src="assets/semwal-logo.svg" alt="Semwal Bespoke logo" />
            <div>
              <h1>Semwal Bespoke Fabrics</h1>
              <p class="sub">Premium fabric catalog for quick code search and client selection.</p>
            </div>
          </div>
          <div class="brand-stat">
            <strong id="totalFabrics">307</strong>
            <span>Fabrics</span>
          </div>
        </div>
        <div class="tools">
          <input id="search" type="search" placeholder="Search fabric code, e.g. I-440 or PI-531" autocomplete="off" />
          <div class="actions">
            <button id="openGallery" class="action-button" type="button">Gallery View</button>
            <a class="action-link primary" href="semwal-bespoke-fabrics-catalog.pdf" download>Download PDF</a>
          </div>
          <div class="filter-panel" aria-label="Catalog filters">
            <div class="filters">
              <span class="filter-label">Series</span>
              <button class="active" type="button" data-filter-group="series" data-filter-value="all">All</button>
              <button type="button" data-filter-group="series" data-filter-value="I">I</button>
              <button type="button" data-filter-group="series" data-filter-value="PI">PI</button>
            </div>
            <div class="filters">
              <span class="filter-label">Pattern</span>
              <button class="active" type="button" data-filter-group="pattern" data-filter-value="all">All</button>
              <button type="button" data-filter-group="pattern" data-filter-value="solid">Solid</button>
              <button type="button" data-filter-group="pattern" data-filter-value="checks">Checks</button>
              <button type="button" data-filter-group="pattern" data-filter-value="stripes">Stripes</button>
              <button type="button" data-filter-group="pattern" data-filter-value="printed">Printed</button>
              <button type="button" data-filter-group="pattern" data-filter-value="texture">Texture</button>
            </div>
            <div class="filters">
              <span class="filter-label">Color</span>
              <button class="active" type="button" data-filter-group="color" data-filter-value="all">All</button>
              <button type="button" data-filter-group="color" data-filter-value="white">White</button>
              <button type="button" data-filter-group="color" data-filter-value="cream">Cream</button>
              <button type="button" data-filter-group="color" data-filter-value="blue">Blue</button>
              <button type="button" data-filter-group="color" data-filter-value="navy">Navy</button>
              <button type="button" data-filter-group="color" data-filter-value="black">Black</button>
              <button type="button" data-filter-group="color" data-filter-value="grey">Grey</button>
              <button type="button" data-filter-group="color" data-filter-value="beige">Beige</button>
              <button type="button" data-filter-group="color" data-filter-value="maroon">Maroon</button>
              <button type="button" data-filter-group="color" data-filter-value="green">Green</button>
            </div>
            <div class="filters">
              <span class="filter-label">Style</span>
              <button class="active" type="button" data-filter-group="style" data-filter-value="all">All</button>
              <button type="button" data-filter-group="style" data-filter-value="shirt">Shirt</button>
              <button type="button" data-filter-group="style" data-filter-value="formal">Formal</button>
              <button type="button" data-filter-group="style" data-filter-value="casual">Casual</button>
              <button type="button" data-filter-group="style" data-filter-value="premium">Premium</button>
              <button type="button" data-filter-group="style" data-filter-value="light">Light</button>
              <button type="button" data-filter-group="style" data-filter-value="dark">Dark</button>
            </div>
            <button id="clearFilters" class="filter-clear" type="button">Clear filters</button>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap">
      <div class="stats">
        <span id="resultCount">Loading fabrics...</span>
        <span>Tap any fabric to inspect it in gallery view.</span>
      </div>
      <section id="grid" class="grid" aria-live="polite"></section>
      <div id="empty" class="empty">No fabric matched that search.</div>
    </main>

    <section id="viewer" class="viewer" aria-modal="true" role="dialog" aria-label="Fabric viewer">
      <div class="viewer-top">
        <button id="closeViewer" class="icon-btn" type="button" aria-label="Close viewer">&times;</button>
        <div class="viewer-title">
          <img class="viewer-mark" src="assets/icon-foreground.svg" alt="" />
          <div class="viewer-copy">
            <span id="viewerCode" class="viewer-code"></span>
            <span id="viewerDetail" class="viewer-detail"></span>
          </div>
        </div>
        <a id="openOriginal" class="icon-btn" href="#" target="_blank" rel="noreferrer" aria-label="Open original image">&#8599;</a>
      </div>
      <div class="viewer-stage">
        <button id="prevButton" class="icon-btn viewer-arrow" type="button" aria-label="Previous fabric">&#8249;</button>
        <div class="viewer-image-wrap">
          <img id="viewerImage" class="viewer-image" alt="" />
          <span class="loading-badge">Loading full image...</span>
        </div>
        <button id="nextButton" class="icon-btn viewer-arrow" type="button" aria-label="Next fabric">&#8250;</button>
      </div>
      <div class="viewer-bottom">
        <div id="viewerCount" class="viewer-count"></div>
        <div id="filmstrip" class="filmstrip" aria-label="Fabric thumbnails"></div>
      </div>
    </section>

    <script>
      const grid = document.querySelector("#grid");
      const empty = document.querySelector("#empty");
      const search = document.querySelector("#search");
      const resultCount = document.querySelector("#resultCount");
      const totalFabrics = document.querySelector("#totalFabrics");
      const filterButtons = Array.from(document.querySelectorAll("[data-filter-group]"));
      const clearFilters = document.querySelector("#clearFilters");
      const viewer = document.querySelector("#viewer");
      const viewerCode = document.querySelector("#viewerCode");
      const viewerDetail = document.querySelector("#viewerDetail");
      const viewerImage = document.querySelector("#viewerImage");
      const viewerCount = document.querySelector("#viewerCount");
      const filmstrip = document.querySelector("#filmstrip");
      const openOriginal = document.querySelector("#openOriginal");
      const closeViewer = document.querySelector("#closeViewer");
      const prevButton = document.querySelector("#prevButton");
      const nextButton = document.querySelector("#nextButton");
      const openGallery = document.querySelector("#openGallery");
      let fabrics = [];
      let visibleFabrics = [];
      let activeFilters = {
        series: "all",
        pattern: "all",
        color: "all",
        style: "all",
      };
      let activeIndex = 0;
      let imageRequestId = 0;
      const DATA_VERSION = "tags-v1";

      function titleCase(value) {
        return String(value || "")
          .split(/[-\s]+/)
          .filter(Boolean)
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(" ");
      }

      function tagList(item, key) {
        return Array.isArray(item[key]) ? item[key] : [];
      }

      function displayTags(item, limit = 4) {
        return [...new Set([...tagList(item, "colors"), ...tagList(item, "patterns"), ...tagList(item, "styles")])]
          .slice(0, limit)
          .map(titleCase);
      }

      function matchesFilter(item) {
        if (activeFilters.series !== "all" && !item.code.startsWith(`${activeFilters.series}-`)) return false;
        if (activeFilters.pattern !== "all" && !tagList(item, "patterns").includes(activeFilters.pattern)) return false;
        if (activeFilters.color !== "all" && !tagList(item, "colors").includes(activeFilters.color)) return false;
        if (
          activeFilters.style !== "all" &&
          !tagList(item, "styles").includes(activeFilters.style) &&
          !tagList(item, "uses").includes(activeFilters.style)
        ) {
          return false;
        }
        return true;
      }

      function matchesQuery(item, query) {
        if (!query) return true;
        const haystack = `${item.code} ${item.type} ${item.filename} ${tagList(item, "tags").join(" ")}`.toLowerCase();
        return haystack.includes(query.toLowerCase());
      }

      function render() {
        const query = search.value.trim();
        visibleFabrics = fabrics.filter((item) => matchesFilter(item) && matchesQuery(item, query));
        grid.innerHTML = visibleFabrics
          .map(
            (item, index) => `
              <article class="card">
                <a class="thumb" href="${item.image}" data-index="${index}" aria-label="Open ${item.code}">
                  <img src="${item.thumb || item.image}" alt="${item.code}" loading="lazy" decoding="async" />
                </a>
                <div class="meta">
                  <div class="meta-line">
                    <span class="code">${item.code}</span>
                    <span class="type">${item.type}</span>
                  </div>
                  <div class="tag-row" aria-label="${item.code} tags">
                    ${displayTags(item, 3)
                      .map((tag) => `<span class="tag-chip">${tag}</span>`)
                      .join("")}
                  </div>
                </div>
              </article>
            `
          )
          .join("");
        resultCount.innerHTML = `<strong>${visibleFabrics.length}</strong> of ${fabrics.length} fabrics`;
        empty.style.display = visibleFabrics.length ? "none" : "block";
      }

      function renderFilmstrip() {
        const start = Math.max(0, activeIndex - 18);
        const end = Math.min(visibleFabrics.length, activeIndex + 19);
        filmstrip.innerHTML = visibleFabrics
          .slice(start, end)
          .map((item, offset) => {
            const index = start + offset;
            return `
              <button type="button" class="${index === activeIndex ? "active" : ""}" data-index="${index}" aria-label="Open ${item.code}">
                <img src="${item.thumb || item.image}" alt="${item.code}" loading="lazy" decoding="async" />
              </button>
            `;
          })
          .join("");
        const activeThumb = filmstrip.querySelector("button.active");
        activeThumb?.scrollIntoView({ inline: "center", block: "nearest" });
      }

      function showFabric(index) {
        if (!visibleFabrics.length) return;
        activeIndex = (index + visibleFabrics.length) % visibleFabrics.length;
        const item = visibleFabrics[activeIndex];
        const requestId = ++imageRequestId;
        const detailTags = displayTags(item, 7).join(" · ");
        viewerCode.textContent = item.code;
        viewerDetail.textContent = `${item.filename} · ${item.type}${detailTags ? ` · ${detailTags}` : ""}`;
        viewerImage.src = item.thumb || item.image;
        viewerImage.alt = item.code;
        viewerImage.classList.add("loading");
        openOriginal.href = item.image;
        viewerCount.textContent = `${activeIndex + 1} of ${visibleFabrics.length}`;
        renderFilmstrip();

        const fullImage = new Image();
        fullImage.onload = () => {
          if (requestId !== imageRequestId) return;
          viewerImage.src = item.image;
          viewerImage.classList.remove("loading");
        };
        fullImage.onerror = () => {
          if (requestId !== imageRequestId) return;
          viewerImage.classList.remove("loading");
        };
        fullImage.src = item.image;
        preloadAround(activeIndex);
      }

      function preloadAround(index) {
        [-2, -1, 1, 2].forEach((offset) => {
          const item = visibleFabrics[(index + offset + visibleFabrics.length) % visibleFabrics.length];
          if (!item) return;
          const image = new Image();
          image.src = item.image;
        });
      }

      function openViewer(index) {
        showFabric(index);
        viewer.classList.add("open");
        document.body.classList.add("viewer-open");
        closeViewer.focus();
      }

      function closeViewerPanel() {
        viewer.classList.remove("open");
        document.body.classList.remove("viewer-open");
        viewerImage.removeAttribute("src");
      }

      function moveViewer(direction) {
        showFabric(activeIndex + direction);
      }

      grid.addEventListener("click", (event) => {
        const link = event.target.closest("[data-index]");
        if (!link) return;
        event.preventDefault();
        openViewer(Number(link.dataset.index));
      });

      filmstrip.addEventListener("click", (event) => {
        const button = event.target.closest("[data-index]");
        if (!button) return;
        showFabric(Number(button.dataset.index));
      });

      closeViewer.addEventListener("click", closeViewerPanel);
      prevButton.addEventListener("click", () => moveViewer(-1));
      nextButton.addEventListener("click", () => moveViewer(1));
      openGallery.addEventListener("click", () => {
        if (visibleFabrics.length) openViewer(0);
      });
      viewer.addEventListener("click", (event) => {
        if (event.target === viewer) closeViewerPanel();
      });

      document.addEventListener("keydown", (event) => {
        if (!viewer.classList.contains("open")) return;
        if (event.key === "Escape") closeViewerPanel();
        if (event.key === "ArrowLeft") moveViewer(-1);
        if (event.key === "ArrowRight") moveViewer(1);
      });

      function syncFilterButtons() {
        filterButtons.forEach((button) => {
          const group = button.dataset.filterGroup;
          button.classList.toggle("active", activeFilters[group] === button.dataset.filterValue);
        });
      }

      filterButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const group = button.dataset.filterGroup;
          activeFilters[group] = button.dataset.filterValue;
          syncFilterButtons();
          render();
        });
      });

      clearFilters.addEventListener("click", () => {
        activeFilters = {
          series: "all",
          pattern: "all",
          color: "all",
          style: "all",
        };
        search.value = "";
        syncFilterButtons();
        render();
      });

      search.addEventListener("input", render);

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      }

      fetch(`catalog-data.json?v=${DATA_VERSION}`, { cache: "no-cache" })
        .then((response) => response.json())
        .then((data) => {
          fabrics = data;
          totalFabrics.textContent = data.length;
          render();
        })
        .catch(() => {
          resultCount.textContent = "Catalog data could not be loaded.";
        });
    </script>
  </body>
</html>
